<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Route Plan</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 60px auto;
      padding: 20px;
      line-height: 1.6;
    }
    select, button {
      font-size: 16px;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Select Route Plan HTML</h1>
  <p>Please select the version you want to open.</p>

  <select id="htmlSelect">
    <option value="">-- Please select --</option>
    <option value="fieldwork_V1_OPTIMIZED_route_estimated_time.html">V1 OPTIMIZED route estimated time</option>
    <option value="fieldwork_V1_tracker_outlook_ios_routefix.html">V1 tracker outlook iOS routefix</option>
    <option value="fieldwork_V2_OPTIMIZED_route_estimated_time.html">V2 OPTIMIZED route estimated time</option>
    <option value="fieldwork_V2_tracker_outlook_ios_routefix.html">V2 tracker outlook iOS routefix</option>
    <option value="fieldwork_V3_OPTIMIZED_route_estimated_time.html">V3 OPTIMIZED route estimated time</option>
    <option value="fieldwork_V3_tracker_outlook_ios_routefix.html">V3 tracker outlook iOS routefix</option>
    <option value="fieldwork_V4_OPTIMIZED_route_estimated_time.html">V4 OPTIMIZED route estimated time</option>
    <option value="fieldwork_V4_tracker_outlook_ios_routefix.html">V4 tracker outlook iOS routefix</option>
  </select>

  <br />

  <button onclick="openSelected()">Open</button>

  <script>
    function openSelected() {
      const file = document.getElementById("htmlSelect").value;
      if (!file) {
        alert("Please select an HTML file.");
        return;
      }
      window.location.href = file;
    }
  </script>
</body>
</html>
