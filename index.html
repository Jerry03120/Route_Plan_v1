<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Route Plan</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 60px auto;
      padding: 20px;
      line-height: 1.6;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 16px;
    }

    select,
    button {
      font-size: 16px;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Select Route Plan HTML</h1>
  <p>Please select the version you want to open.</p>

  <select id="htmlSelect">
    <option value="">-- Please select --</option>
    <option value="fieldwork_V1_DAY_SPLIT.html">V1 DAY SPLIT</option>
    <option value="fieldwork_V2_DAY_SPLIT.html">V2 DAY SPLIT</option>
    <option value="fieldwork_V3_DAY_SPLIT.html">V3 DAY SPLIT</option>
    <option value="fieldwork_V4_DAY_SPLIT.html">V4 DAY SPLIT</option>
  </select>

  <br />

  <button onclick="openSelected()">Open</button>

  <script>
    function openSelected() {
      const file = document.getElementById("htmlSelect").value;

      if (!file) {
        alert("Please select an HTML file.");
        return;
      }

      window.location.href = file;
    }
  </script>
</body>
</html>
